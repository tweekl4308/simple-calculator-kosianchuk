name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install flake8
          pip install bandit

      - name: Run linting
        run: |
          flake8 .

      - name: Run unit tests
        run: |
          pytest

      - name: Run security scan
        run: |
          bandit -r .
